<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wheel Control System Setting</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Font Awesome JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" defer></script>

    <!-- WCS Common CSS -->
    <link href="./css/002_wcs_common.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js" defer></script>

     <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <!-- Import map for module resolution -->
    <script type="importmap">
        {
        "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/",
                "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/src/URDFLoader.js"
            }
        }
    </script>

    <script src="./js/010_wcs_common.js" defer></script>
</head>

<body>

    <!-- 상단 메뉴 -->
    <header class="p-1 text-bg-dark fs-5">

        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">

                <ul class="nav flex-grow-1 mb-2 justify-content-center mb-md-0">
                    <li>
                        <a href="100_vehicle_status.html" class="nav-link px-2 text-secondary">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Vehicle Status
                        </a>
                    </li>
                    <li>
                        <a href="110_vehicle_setting.html" class="nav-link px-2 text-white">
                            <i class="bi bi-gear-fill me-2"></i>
                            Vehicle Setting
                        </a>
                    </li>
                    <li>
                        <a href="120_vehicle_test.html" class="nav-link px-2 text-white">
                            <i class="bi bi-play-circle-fill me-2"></i>
                            Vehicle Test
                        </a>
                    </li>
                </ul>

                <!-- MQTT 상태 표시 영역 -->
                <div id="mqtt-status-container" class="d-flex align-items-center me-3">
                    <!-- MQTT 상태가 여기에 동적으로 추가됩니다 -->
                </div>

                <!-- 최근 MQTT 메시지 표시 영역 -->
                <div id="mqtt-message-display" class="d-flex align-items-center" style="width: 300px; min-width: 300px; flex-shrink: 0;">
                    <div class="badge bg-info text-dark fs-6 px-3 py-2 w-100 d-flex align-items-center" style="min-width: 0;">
                        <i class="fas fa-envelope me-2 flex-shrink-0"></i>
                        <div class="d-flex justify-content-between align-items-center w-100 text-truncate">
                            <span id="mqtt-topic" class="fw-bold text-white">대기중</span>
                            <span id="mqtt-value" class="text-white-50 flex-shrink-0">-</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>
    <!-- // 상단 메뉴 -->

    <main class="container-fluid my-4"> 

        <div class="card">
            
            <div class="card-header text-center">
                <h4 class="mb-0">Wheel Setting</h4>
            </div>

            <div class="card-body p-2">

                <div class="row">

                    <!-- 바퀴 정보 --> 
                    <div class="col-md-3 d-flex" >
                        <div class="card text-center h-100 w-100">
                            <div class="card-header">
                                <h4 class="mb-0">Wheel</h4>
                            </div>
                            <div class="card-body d-flex flex-column p-2">
                                <div id="robot-container-1" class="robot-container border border-1 w-100" >
                                    <img src="img/smart_wheel.png" alt="FL Wheel Image" class="img-fluid mb-2" >
                                </div>
                            </div> 
                        </div>
                    </div>
                    <!-- // 바퀴 정보 -->

                    <!-- 차량 정보 -->
                    <div class="col-md-3 p-0 d-flex vehicle_image">

                        <div class="card text-center h-100 w-100">
                            <div class="card-header">
                                <h4 class="mb-0">Vehicle</h4>
                            </div>

                            <div class="card-body d-flex flex-column">

                                <div class="row">
                                    <div class="col-md-6">
                                        <table class="table table-bordered table-sm mb-0 w-100">
                                            <colgroup>
                                                <col width="40%;">
                                                <col >
                                            </colgroup>
                                            <tbody>
                                                <tr>
                                                    <th class="text-center bg-light">X</th>
                                                    <td id="wheel/fl/position/x" class="text-nowrap text-center bg-white">0.5</td>
                                                </tr>
                                                <tr>
                                                    <th class="text-center bg-light">Y</th>
                                                    <td id="wheel/fl/position/y" class="text-nowrap text-center bg-white">0.5</td>
                                                </tr>
                                            </tbody>
                                        </table> 
                                    </div> 
                                    <div class="col-md-6">
                                        <table class="table table-bordered table-sm mb-0 w-100">
                                            <colgroup>
                                                <col width="40%;">
                                                <col >
                                            </colgroup>
                                            <tbody>
                                                <tr>
                                                    <th class="text-center bg-light">X</th>
                                                    <td id="wheel/fr/position/x" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                                <tr>
                                                    <th class="text-center bg-light">Y</th>
                                                    <td id="wheel/fr/position/y" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                            </tbody>
                                        </table> 
                                    </div>
                                </div>
                                <div class="row"> 
                                    <div class="col-md-12">
                                        <img src="img/vehicle.png" alt="Vehicle Image" class="img-fluid" >
                                    </div> 
                                </div>

                                <div class="row">
                                    <div class="cold-md-6">
                                        <table class="table table-bordered table-sm mb-0 w-100">
                                            <colgroup>
                                                <col width="40%;">
                                                <col >
                                            </colgroup>
                                            <tbody>
                                                <tr>
                                                    <th class="text-center bg-light">X</th>
                                                    <td id="wheel/rl/position/x" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                                <tr>
                                                    <th class="text-center bg-light">Y</th>
                                                    <td id="wheel/rl/position/y" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="cold-md-6">
                                        <table class="table table-bordered table-sm mb-0 w-100">
                                            <colgroup>
                                                <col width="40%;">
                                                <col >
                                            </colgroup>
                                            <tbody>
                                                <tr>
                                                    <th class="text-center bg-light">X</th>
                                                    <td id="wheel/rr/position/x" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                                <tr>
                                                    <th class="text-center bg-light">Y</th>
                                                    <td id="wheel/rr/position/y" class="text-nowrap text-end bg-white">0.5</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                    <!-- // 차량 정보 -->

                    <!-- 차량 설정 -->
                    <div class="col-md-3 d-flex vehicle_image">
                        <div class="card h-100 w-100">
                            <div class="card-header text-center">
                                <h4 class="mb-0"> Setting </h4>
                            </div>
                            <div class="card-body">
                                
                                <!-- 바퀴 선택 -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold"><i class="bi bi-bullseye me-2"></i>바퀴 선택</label>
                                    <div class="btn-group w-100" role="group" aria-label="Wheel selection">
                                        <input type="radio" class="btn-check" name="wheelPosition" id="wheel-fl" value="FL" checked>
                                        <label class="btn btn-outline-secondary" for="wheel-fl">FL</label>

                                        <input type="radio" class="btn-check" name="wheelPosition" id="wheel-fr" value="FR">
                                        <label class="btn btn-outline-secondary" for="wheel-fr">FR</label>

                                        <input type="radio" class="btn-check" name="wheelPosition" id="wheel-rl" value="RL">
                                        <label class="btn btn-outline-secondary" for="wheel-rl">RL</label>

                                        <input type="radio" class="btn-check" name="wheelPosition" id="wheel-rr" value="RR">
                                        <label class="btn btn-outline-secondary" for="wheel-rr">RR</label>
                                    </div>
                                </div>

                                <!-- 최고 속도 설정 -->
                                <div class="mb-4">
                                    <label for="maxSpeed" class="form-label fw-bold"><i class="bi bi-speedometer2 me-2"></i>최고 속도</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control text-end" id="maxSpeed" value="4" step="0.1" min="0" max="10">
                                        <span class="input-group-text text-center" style="width: 60px;">km/s</span>
                                        <span type="button" class="input-group-text text-center" > 설정 </span>
                                    </div>
                                </div>

                                <!-- ToF 캘리브레이션 -->
                                <div class="mb-3">
                                    <label for="tofCalibration" class="form-label fw-bold"><i class="bi bi-radar me-2"></i>ToF 캘리브레이션</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control text-end" id="tofCalibration" value="-0.2" step="0.1">
                                        <span class="input-group-text text-center" style="width: 60px;">cm</span>
                                        <span type="button" class="input-group-text text-center" > 실행 </span>
                                    </button>
                                    </div>
                                </div> 

                            </div>
                        </div>
                    </div>
                    <!-- // 차량 설정 -->

                    <!-- 바퀴 속성 정보 -->
                    <div class="col-md-3 d-flex ps-0" >
                        <div class="card h-100 w-100"> 
                            <div class="card-header text-center">
                                <h4 class="mb-0"> Data </h4>
                            </div>

                            <div class="card-body p-2">
                                <table class="table table-bordered table-striped m-0 ">
                                    <colgroup>
                                        <col width="33%;">
                                        <col >
                                    </colgroup>

                                    <thead class="table-dark">
                                        <tr>
                                            <th class="text-center" scope="col" colspan="2">Sensor</th> 
                                        </tr>
                                    </thead>

                                    <tbody>
                                        <tr>
                                            <th class="text-center" scope="row">Obstacle</th>
                                            <td id="wheel/fl/linear/speed" class="text-end">10.5 cm</td>
                                        </tr>
                                        <tr>
                                            <th class="text-center" scope="row">Axis</th>
                                            <td id="wheel/fl/axis/angle" class="text-end">10°</td>
                                        </tr>
                                        <tr>
                                            <th class="text-center" scope="row">KP</th>
                                            <td id="wheel/fl/pid/p" class="text-end">1.5</td>
                                        </tr>
                                        <tr>
                                            <th class="text-center" scope="row">KI</th>
                                            <td id="wheel/fl/pid/i" class="text-end">0.01</td>
                                        </tr>
                                        <tr>
                                            <th class="text-center" scope="row">KD</th>
                                            <td id="wheel/fl/pid/d" class="text-end">0.5</td>
                                        </tr>  
                                    </tbody>

                                </table> 
                            </div>
                        </div>
                    </div>
                    <!-- // 바퀴 속성 정보 -->

                </div>
                    
            </div>
        </div>

    </main>

    <footer class="text-center py-4">
        <p class="mb-0">&copy; 2024 Wheel Control System. All rights reserved.</p>
    </footer> 

    <script type="module" src="../urdf/urdf.js"></script>

    <!-- MQTT 클라이언트 모듈 -->
    <script src="./js/mqtt.js"></script>

    <script src="./js/mqtt_process_01_status.js"></script>

</body>

</html>
