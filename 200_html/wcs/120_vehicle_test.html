<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wheel Control System Test</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Font Awesome JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" defer></script>

    <!-- WCS Common CSS -->
    <link href="./css/002_wcs_common.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js" defer></script>

     <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <!-- Import map for module resolution -->
    <script type="importmap">
        {
        "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/",
                "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/src/URDFLoader.js"
            }
        }
    </script>

    <script src="./js/010_wcs_common.js" defer></script>
</head>

<body>

    <!-- 상단 메뉴 -->
    <header class="p-1 text-bg-dark fs-5">

        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">

                <ul class="nav flex-grow-1 mb-2 justify-content-center mb-md-0">
                    <li>
                        <a href="100_vehicle_status.html" class="nav-link px-2 text-secondary">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Vehicle Status
                        </a>
                    </li>
                    <li>
                        <a href="110_vehicle_setting.html" class="nav-link px-2 text-white">
                            <i class="bi bi-gear-fill me-2"></i>
                            Vehicle Setting
                        </a>
                    </li>
                    <li>
                        <a href="120_vehicle_test.html" class="nav-link px-2 text-white">
                            <i class="bi bi-play-circle-fill me-2"></i>
                            Vehicle Test
                        </a>
                    </li>
                </ul>

                <!-- MQTT 상태 표시 영역 -->
                <div id="mqtt-status-container" class="d-flex align-items-center me-3">
                    <!-- MQTT 상태가 여기에 동적으로 추가됩니다 -->
                </div>

                <!-- 최근 MQTT 메시지 표시 영역 -->
                <div id="mqtt-message-display" class="d-flex align-items-center" style="width: 300px; min-width: 300px; flex-shrink: 0;">
                    <div class="badge bg-info text-dark fs-6 px-3 py-2 w-100 d-flex align-items-center" style="min-width: 0;">
                        <i class="fas fa-envelope me-2 flex-shrink-0"></i>
                        <div class="d-flex justify-content-between align-items-center w-100 text-truncate">
                            <span id="mqtt-topic" class="fw-bold text-white">대기중</span>
                            <span id="mqtt-value" class="text-white-50 flex-shrink-0">-</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>
    <!-- // 상단 메뉴 -->

    <main class="container-fluid my-4"> 

        <div class="card">
            
            <div class="card-header text-center">
                <h4 class="mb-0">Wheel Test</h4>
            </div>

            <div class="card-body p-2">

                <div class="row">

                    <!-- 차량 정보 -->
                    <div class="col-md-4 d-flex">

                        <div class="card text-center h-100 w-100">
                            <div class="card-header text-center">
                                <h4 class="mb-0"> Vehicle </h4>
                            </div>

                            <div class="card-body d-flex flex-column">
                                
                                <!-- 차량 이미지 영역 -->
                                <div class="flex-grow-1 d-flex align-items-center justify-content-center">
                                    <table id="vehicle-frame" class="table table-borderless p-0">

                                        <!-- FL, FR 휠 위치 표시 -->
                                        <tr>
                                            <td class="p-0" colspan="2">
                                                <table class="table table-bordered table-sm mb-0 w-100">
                                                    <colgroup>
                                                        <col width="40%;">
                                                        <col >
                                                    </colgroup>
                                                    <tbody>
                                                        <tr>
                                                            <th class="text-center bg-light">X</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                        <tr>
                                                            <th class="text-center bg-light">Y</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </td> 

                                            <td class="borderless p-0">&nbsp;</td> 

                                            <td class="p-0" colspan="2">
                                                <table class="table table-bordered table-sm mb-0 w-100">
                                                    <colgroup>
                                                        <col width="40%;">
                                                        <col >
                                                    </colgroup>
                                                    <tbody>
                                                        <tr>
                                                            <th class="text-center bg-light">X</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                        <tr>
                                                            <th class="text-center bg-light">Y</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </td>
                                        </tr>
                                        <!-- // FL, FR 휠 위치 표시 -->

                                        <tr>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                        </tr>

                                        <tr>
                                            <td class="text-center borderless p-0">
                                                <img src="img/wheel_01_fl.png" alt="Vehicle Image" class="img-fluid" style="margin-top: 34px;">
                                            </td>
                                            <td class="text-center borderless p-0" colspan="3" rowspan="3">
                                                <img src="img/vehicle_body.png" alt="Vehicle Image" class="img-fluid">
                                            </td>
                                            <td class="text-center borderless p-0">
                                                <img src="img/wheel_02_fr.png" alt="Vehicle Image" class="img-fluid" style="margin-top: 34px;">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="borderless p-0">&nbsp;</td> 
                                            <td class="borderless p-0">&nbsp;</td>
                                            <td class="borderless p-0">&nbsp;</td>
                                            <td class="borderless p-0">&nbsp;</td>
                                            <td class="borderless p-0">&nbsp;</td>
                                        </tr>
                                        <tr>
                                            <td class="text-center borderless p-0">
                                                <img src="img/wheel_03_rl.png" alt="Vehicle Image" class="img-fluid" style="margin-top: 64px;">
                                            </td> 
                                            <td class="text-center borderless p-0">
                                                <img src="img/wheel_04_rr.png" alt="Vehicle Image" class="img-fluid" style="margin-top: 64px;">
                                            </td>
                                        </tr>

                                        <tr>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                        </tr>

                                        <!-- RL, RR 휠 위치 표시 -->
                                        <tr>
                                            <td class="p-0"  colspan="2"> 
                                                <table class="table table-bordered table-sm mb-0 w-100">
                                                    <colgroup>
                                                        <col width="40%;">
                                                        <col >
                                                    </colgroup>
                                                    <tbody>
                                                        <tr>
                                                            <th class="text-center bg-light">X</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                        <tr>
                                                            <th class="text-center bg-light">Y</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </td> 

                                            <td></td>

                                            <td class="p-0"  colspan="2"> 
                                                <table class="table table-bordered table-sm mb-0 w-100">
                                                    <colgroup>
                                                        <col width="40%;">
                                                        <col >
                                                    </colgroup>
                                                    <tbody>
                                                        <tr>
                                                            <th class="text-center bg-light">X</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                        <tr>
                                                            <th class="text-center bg-light">Y</th>
                                                            <td class="text-center bg-white">0.5</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </td>
                                        </tr>
                                        <!-- // RL, RR 휠 위치 표시 -->

                                    </table>
                                </div>  
                            </div>
                        </div>

                    </div>
                    <!-- // 차량 정보 -->

                    <!-- Wheel Test -->
                    <div class="col-md-4 d-flex ps-0">
                        <div class="card h-100 w-100">
                            <div class="card-header text-center">
                                <h5 class="mb-0"> Wheel Test </h5>
                            </div>
                            <div class="card-body">
                                
                                <!-- Wheel Selection -->
                                <div class="mb-4">
                                    
                                    <div class="row">
                                        <!-- 바퀴 선택 (수직) -->
                                        <div class="col-4">
                                            <label class="form-label fw-bold"><i class="bi bi-bullseye me-2"></i>바퀴 선택</label>
                                        
                                            <div class="btn-group-vertical h-100 w-100" role="group" aria-label="Wheel selection">
                                                <input type="radio" class="btn-check" name="wheelTestPosition" id="wheel-test-fl" value="FL" checked>
                                                <label class="btn btn-outline-secondary fw-bold fs-5" for="wheel-test-fl">FL</label>

                                                <input type="radio" class="btn-check" name="wheelTestPosition" id="wheel-test-fr" value="FR">
                                                <label class="btn btn-outline-secondary fw-bold fs-5" for="wheel-test-fr">FR</label>

                                                <input type="radio" class="btn-check" name="wheelTestPosition" id="wheel-test-rl" value="RL">
                                                <label class="btn btn-outline-secondary fw-bold fs-5" for="wheel-test-rl">RL</label>

                                                <input type="radio" class="btn-check" name="wheelTestPosition" id="wheel-test-rr" value="RR">
                                                <label class="btn btn-outline-secondary fw-bold fs-5" for="wheel-test-rr">RR</label>
                                            </div>
                                        </div>

                                        <!-- 회전 테스트 버튼 -->
                                        <div class="col-8 ps-0">
                                            <label class="form-label fw-bold"><i class="bi bi-controller me-2"></i>동작 선택</label>

                                            <div class="d-grid gap-2 h-100">
                                                <button type="button" class="btn btn-success text-black fw-bold fs-5" id="test-clockwise">
                                                    <i class="bi bi-arrow-clockwise me-1 fs-4"></i>정회전
                                                </button>
                                                <button type="button" class="btn btn-warning text-black fw-bold fs-5" id="test-counterclockwise">
                                                    <i class="bi bi-arrow-counterclockwise me-1 fs-4"></i>역회전
                                                </button>
                                                <button type="button" class="btn btn-danger text-black fw-bold fs-5" id="test-stop">
                                                    <i class="bi bi-stop-fill me-1 fs-4"></i>정지
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div> 

                            </div>
                        </div>
                    </div>
                    <!-- // 휠 테스트 -->

                    <!-- 차량 테스트 -->
                    <div class="col-md-4 d-flex ps-0">
                        <div class="card h-100 w-100">
                            <div class="card-header text-center">
                                <h5 class="mb-0">Vehicle Test</h5>
                            </div>
                            <div class="card-body">
                                
                                <!-- 차량 이동 제어 -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold"><i class="bi bi-arrow-up-circle me-2"></i>방향 제어</label>
                                    
                                    <!-- 전진/후진 -->
                                    <div class="row mb-3">
                                        <div class="col-6 pe-1">
                                            <button type="button" class="btn btn-outline-secondary text-white w-100 py-3 fw-bold fs-5 active" id="vehicle-forward">
                                                <i class="bi bi-arrow-up me-2 fs-4"></i>전진
                                            </button>
                                        </div>
                                        <div class="col-6 ps-1">
                                            <button type="button" class="btn btn-outline-secondary text-black w-100 py-3 fw-bold fs-5" id="vehicle-backward">
                                                <i class="bi bi-arrow-down me-2 fs-4"></i>후진
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <!-- 좌회전/우회전 -->
                                    <div class="row mb-3">
                                        <div class="col-6 pe-1">
                                            <button type="button" class="btn btn-outline-secondary text-black w-100 py-3 fw-bold fs-5" id="vehicle-turn-left">
                                                <i class="bi bi-arrow-left me-2 fs-4"></i>좌회전
                                            </button>
                                        </div>
                                        <div class="col-6 ps-1">
                                            <button type="button" class="btn btn-outline-secondary text-black w-100 py-3 fw-bold fs-5" id="vehicle-turn-right">
                                                <i class="bi bi-arrow-right me-2 fs-4"></i>우회전
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <!-- 정지 -->
                                    <div class="d-grid">
                                        <button type="button" class="btn btn-outline-secondary text-black py-3 fw-bold fs-5" id="vehicle-stop">
                                            <i class="bi bi-stop-circle me-2 fs-4"></i> 정지
                                        </button>
                                    </div>
                                </div>

                                <!-- 속도 제어 -->
                                <div class="mb-3">
                                    <label for="vehicleSpeed" class="form-label fw-bold"><i class="bi bi-speedometer2 me-2"></i>속도 설정</label>
                                    <div class="input-group">
                                        <div class="w-100 d-flex justify-content-center">
                                            <span class="input-group-text bg-light justify-content-center" style="width: 100px;">
                                                <span id="speed-value">50 Km/h</span>
                                            </span>
                                        </div>
                                        <input type="range" class="form-range" id="vehicleSpeed" min="0" max="100" value="50"> 
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                    <!-- // 차량 테스트 -->

                </div>
            </div>
        </div>

    </main>

    <footer class="text-center py-4">
        <p class="mb-0">&copy; 2024 Wheel Control System. All rights reserved.</p>
    </footer> 
</body>

</html>
