    <!-- Vehicle Test 페이지 전용 JavaScript -->
    <script>
        $(document).ready(function() {
            // 바퀴 선택에 따른 차량 이미지 업데이트 함수
            function updateVehicleImage() {
                const selectedWheel = $('input[name="wheelTestPosition"]:checked').val().toLowerCase();
                const newImageSrc = `img/vehicle_wheel_${selectedWheel}_selected.png`;
                $('#vehicle-image').attr('src', newImageSrc);
                console.log(`[Vehicle Test] 🖼️ 차량 이미지 업데이트: ${newImageSrc}`);
            }

            // 바퀴 선택 변경 이벤트
            $('input[name="wheelTestPosition"]').change(function() {
                const selectedWheel = $(this).val();
                console.log(`[Vehicle Test] 🎯 바퀴 선택 변경: ${selectedWheel}`);
                
                // 차량 이미지 업데이트
                updateVehicleImage();
                
                // 선택된 바퀴에 따른 시각적 피드백
                $('#vehicle-image')
                    .animate({opacity: 0.8}, 200)
                    .animate({opacity: 1}, 200);
            });

            // 페이지 로드시 초기 차량 이미지 설정
            updateVehicleImage();

            // 바퀴 테스트 명령 전송 함수
            function sendWheelCommand(command, buttonElement, actionName, icon) {
                const selectedWheel = $('input[name="wheelTestPosition"]:checked').val().toLowerCase();
                const topic = `wheel/${selectedWheel}/operation/command`;
                
                sendMQTTMessage(topic, command, 1);
                console.log(`[Vehicle Test] ${icon} ${selectedWheel.toUpperCase()} 바퀴 ${actionName} 명령 전송: ${topic} = ${command}`);
                
                // 버튼 피드백 - 더 명확한 시각적 효과
                const originalOpacity = buttonElement.css('opacity');
                const originalTransform = buttonElement.css('transform');
                
                buttonElement
                    .css({
                        'opacity': '0.7',
                        'transform': 'scale(0.95)',
                        'transition': 'all 0.1s ease'
                    })
                    .addClass('shadow-lg');

                setTimeout(() => {
                    buttonElement
                        .css({
                            'opacity': originalOpacity,
                            'transform': originalTransform
                        })
                        .removeClass('shadow-lg');
                }, 1000);
            }

            // 차량 제어 명령 전송 함수
            function sendVehicleCommand(command, buttonElement, actionName, icon) {
                const topic = 'vehicle/operation/command';
                
                // 모든 차량 제어 버튼에서 active와 text-white 클래스 제거
                $('#vehicle-forward, #vehicle-backward, #vehicle-turn-left, #vehicle-turn-right, #vehicle-stop')
                    .removeClass('active text-white')
                    .addClass('text-black');
                
                // 클릭된 버튼에만 active와 text-white 클래스 추가
                buttonElement
                    .addClass('active text-white')
                    .removeClass('text-black');
                
                sendMQTTMessage(topic, command, 1);
                console.log(`[Vehicle Test] ${icon} 차량 ${actionName} 명령 전송: ${topic} = ${command}`);
                
                // 버튼 피드백 - 더 명확한 시각적 효과
                const originalOpacity = buttonElement.css('opacity');
                const originalTransform = buttonElement.css('transform');
                
                buttonElement
                    .css({
                        'opacity': '0.7',
                        'transform': 'scale(0.95)',
                        'transition': 'all 0.1s ease'
                    })
                    .addClass('shadow-lg');

                setTimeout(() => {
                    buttonElement
                        .css({
                            'opacity': originalOpacity,
                            'transform': originalTransform
                        })
                        .removeClass('shadow-lg');
                }, 1000);
            }

            // 테스트 버튼 이벤트 - 통합된 함수 사용
            $('#test-clockwise').click(function() {
                sendWheelCommand(1, $(this), '정회전', '⏰');
            });

            $('#test-counterclockwise').click(function() {
                sendWheelCommand(2, $(this), '역회전', '↩️');
            });

            $('#test-stop').click(function() {
                sendWheelCommand(0, $(this), '정지', '⏹️');
            });

            // 차량 제어 버튼 이벤트
            $('#vehicle-forward').click(function() {
                sendVehicleCommand(1, $(this), '전진', '⬆️');
            });

            $('#vehicle-backward').click(function() {
                sendVehicleCommand(2, $(this), '후진', '⬇️');
            });

            $('#vehicle-turn-left').click(function() {
                sendVehicleCommand(3, $(this), '좌회전', '⬅️');
            });

            $('#vehicle-turn-right').click(function() {
                sendVehicleCommand(4, $(this), '우회전', '➡️');
            });

            $('#vehicle-stop').click(function() {
                sendVehicleCommand(0, $(this), '정지', '⏹️');
            });

            // 속도 슬라이더 이벤트 핸들러 - 최고 속도 MQTT 발행
            $('#vehicleMaxSpeedSlider').on('input change', function() {
                const speedKmh = $(this).val(); // 슬라이더 값 (km/h)
                const speedMs = speedKmh / 3.6; // km/h를 m/s로 변환
                
                // 속도 표시 업데이트
                $('[id="vehicle/max_speed"]').text(`${speedKmh} Km/h`); 
                
                // MQTT로 최고 속도 발행 (m/s 단위)
                const topic = 'vehicle/max_speed';
                sendMQTTMessage(topic, speedMs, 1);
                
                console.log(`[Vehicle Test] 🚀 최고 속도 설정 - ${speedKmh} Km/h (${speedMs.toFixed(2)} m/s): ${topic} = ${speedMs}`);
            });
        });
    </script>
