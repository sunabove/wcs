<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wheel Status Monitoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            background: #0f2238;
            color: white;
        }

        .dashboard {
            background: #1b3553;
            border-radius: 15px;
            padding: 25px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
        }

        .speed-box {
            background: #2d5c8c;
            padding: 10px 20px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 10px;
        }

        .wheel {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #444;
            border: 6px solid #888;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wheel-label {
            position: absolute;
            top: -20px;
            background: #ff8c3a;
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .car-body {
            _width: 200px;
            height: 300px;
            background: #2c3e50;
            border-radius: 40px;
            margin: auto;
        }

        .sensor-box {
            font-size: 30px;
        }

        .battery {
            height: 30px;
            background: #1e2e45;
            border-radius: 10px;
            padding: 4px;
        }

        .battery-bar {
            height: 100%;
            width: 78%;
            background: #42d76b;
            border-radius: 6px;
        }
    </style>

</head>


<body>

    <div class="container mt-4">

        <div class="dashboard">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="d-flex align-items-center gap-3">
                    <h3>
                        <a href="110_vehicle_setting.html"> WCS </a>
                    </h3>
                    <div class="title">Wheel Status Monitoring</div>
                </div>

                <div class="speed-box">
                    2.5 m/s
                </div>

            </div>


            <div class="row">

                <!-- LEFT DATA -->
                <div class="col-md-3">

                    <h3>2.5 m/s</h3>
                    <h4 class="text-warning">60.0 °/s</h4>

                    <hr>

                    <h3>2.5 m/s</h3>
                    <h4 class="text-warning">60.0 °/s</h4>

                </div>



                <!-- CAR VIEW -->
                <div class="col-md-6 text-center">

                    <div class="row">

                        <div class="col-3">

                            <div class="wheel">
                                <div class="wheel-label">FL</div>
                                2.5
                            </div>

                        </div>


                        <div class="col-6">

                            <img src="car_frame.png" width="250px" alt="Car Icon">

                        </div>


                        <div class="col-3">

                            <div class="wheel">
                                <div class="wheel-label">FR</div>
                                2.5
                            </div>

                        </div>

                    </div>



                    <div class="row mt-4">

                        <div class="col-3">

                            <div class="wheel">
                                <div class="wheel-label">RL</div>
                                2.7
                            </div>

                        </div>


                        <div class="col-6"></div>


                        <div class="col-3">

                            <div class="wheel">
                                <div class="wheel-label">RR</div>
                                2.6
                            </div>

                        </div>

                    </div>

                </div>



                <!-- RIGHT DATA -->
                <div class="col-md-3">

                    <h4>ToF Sensor</h4>

                    <div class="sensor-box mb-3">
                        130 mm
                    </div>

                    <hr>

                    <h3>2.5 m/s</h3>
                    <h4 class="text-warning">60.0 °/s</h4>

                </div>

            </div>


            <hr>


            <!-- SURFACE -->
            <div class="row">

                <div class="col-md-6">

                    <h5>Surface Status</h5>

                </div>

                <div class="col-md-6">

                    <h5>Incline</h5>

                </div>

            </div>


            <!-- BATTERY -->

            <div class="battery mt-4">
                <div class="battery-bar"></div>
            </div>

            <div class="text-center mt-2">
                Battery 78%
            </div>


        </div>

    </div>

</body>

</html>
