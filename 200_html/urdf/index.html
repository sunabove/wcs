<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URDF Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        #robot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 90vw;
            max-width: 1200px;
            height: 80vh;
            max-height: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        .robot-container {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
            position: relative;
        }

        .robot-container .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 100;
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .info {
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
    </style>
    
</head>

<body>
    <div class="controls">
        <h1>URDF Viewer - 4 Panel View</h1>
        <p>Click and drag to rotate • Scroll to zoom • Click on robot to set target</p>
    </div>

    <div id="robot-grid">
        <div class="robot-container" id="robot-container-1">
            <div class="label">Front Right</div>
        </div>
        <div class="robot-container" id="robot-container-2">
            <div class="label">Front Left</div>
        </div>
        <div class="robot-container" id="robot-container-3">
            <div class="label">Back Right</div>
        </div>
        <div class="robot-container" id="robot-container-4">
            <div class="label">Back Left</div>
        </div>
    </div>
    
    <div class="info">
        <p>Robot model will appear in each panel above. Check console for loading status.</p>
    </div>

    <!-- Import map for module resolution -->
    <script type="importmap">
        {
        "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/",
                "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/src/URDFLoader.js"
            }
        }
    </script>
    <script type="module" src="urdf.js"></script>
</body>

</html>
