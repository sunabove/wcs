<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WCS Setting</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Font Awesome JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" defer></script>

    <!-- WCS Common CSS -->
    <link href="./css/002_wcs_common.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js" defer></script>

     <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

    <!-- Import map for module resolution -->
    <script type="importmap">
        {
        "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/",
                "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/src/URDFLoader.js"
            }
        }
    </script>

    <script src="./js/010_wcs_common.js" defer></script>
</head>

<body>

    <!-- 상단 메뉴 -->
    <header class="p-1 text-bg-dark fs-5">

        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">

                <ul class="nav flex-grow-1 mb-2 justify-content-center mb-md-0">
                    <li>
                        <a href="100_vehicle_status.html" class="nav-link px-2 text-secondary">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Vehicle Status
                        </a>
                    </li>
                    <li>
                        <a href="110_vehicle_setting.html" class="nav-link px-2 text-white">
                            <i class="bi bi-gear-fill me-2"></i>
                            Vehicle Setting
                        </a>
                    </li>
                    <li>
                        <a href="120_vehicle_test.html" class="nav-link px-2 text-white">
                            <i class="bi bi-play-circle-fill me-2"></i>
                            Vehicle Test
                        </a>
                    </li>
                </ul>

                <ul class="nav mb-2 ms-3 mb-md-0">
                    <li>
                        <a href="200_wcs_setting.html" class="nav-link px-2 text-white">
                            <i class="bi bi-sliders me-2"></i>
                            WCS Setting
                        </a>
                    </li>
                </ul>

                <!-- MQTT 상태 표시 영역 -->
                <div id="mqtt-status-container" class="d-flex align-items-center me-3">
                    <!-- MQTT 상태가 여기에 동적으로 추가됩니다 -->
                </div>

                <!-- 최근 MQTT 메시지 표시 영역 -->
                <div id="mqtt-message-display" class="d-flex align-items-center" style="width: 300px; min-width: 300px; flex-shrink: 0;">
                    <div class="badge bg-info text-dark fs-6 px-3 py-2 w-100 d-flex align-items-center" style="min-width: 0;">
                        <i class="fas fa-envelope me-2 flex-shrink-0"></i>
                        <div class="d-flex justify-content-between align-items-center w-100 text-truncate">
                            <span id="mqtt-topic" class="fw-bold text-white">대기중</span>
                            <span id="mqtt-value" class="text-white-50 flex-shrink-0">-</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>
    <!-- // 상단 메뉴 -->

    <main class="container-fluid my-4"> 

        <div class="card">
            
            <div class="card-header text-center">
                <h4 class="mb-0"> WCS Setting </h4>
            </div>

            <div class="card-body p-2"> 

                <div class="row g-3">
                    <div class="col">
                        <div class="border rounded p-3 bg-light">
                            <div class="row g-3 align-items-center">
                                <div class="col-md-3">
                                    <h5 class="mb-1">
                                        <i class="bi bi-cpu me-2"></i>시뮬레이션 제어
                                    </h5>
                                    <small class="text-muted">시뮬레이션 시작/중지 설정</small>
                                </div>

                                <div class="col-md-6">
                                    <div class="d-flex flex-wrap gap-2 align-items-center">
                                        <button type="button" id="btn-sim-start" class="btn btn-success">
                                            <i class="bi bi-play-fill me-1"></i>
                                            시작
                                        </button>
                                        <button type="button" id="btn-sim-stop" class="btn btn-danger">
                                            <i class="bi bi-stop-fill me-1"></i>
                                            중지
                                        </button>
                                        
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <span class="badge bg-secondary fs-4" id="sim-status">상태: 대기</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col">
                        <div class="border rounded p-3 bg-light">
                            <div class="row g-3 align-items-center">
                                <div class="col-md-3">
                                    <h5 class="mb-1">
                                        <i class="bi bi-water me-2"></i>노면 종류 설정
                                    </h5>
                                    <small class="text-muted">현재 주행 환경의 노면 종류를 선택합니다.</small>
                                </div>

                                <div class="col-md-6">
                                    <select class="form-select" id="road-condition">
                                        <option value="road" selected>도로</option>
                                        <option value="gravel">자갈길</option>
                                        <option value="icy">빙판길</option>
                                        <option value="pothole">포트홀</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <button type="button" id="btn-road-apply" class="btn btn-primary w-100">
                                        <i class="bi bi-check2-circle me-1"></i> 적용
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

    </main>

    <footer class="text-center py-4">
        <p class="mb-0">&copy; 2024 Wheel Control System. All rights reserved.</p>
    </footer>

    <!-- MQTT 클라이언트 모듈 -->
    <script src="./js/mqtt.js"></script>

    <script>
        // MQTT 메시지 수신 처리
        function prcessMqttMessage(topic, value) {
            if (topic === 'simulation/start' && value === 'start') {
                $('#sim-status').removeClass('bg-secondary bg-danger').addClass('bg-success').text('상태: 실행 중');
            } else if (topic === 'simulation/stop' && value === 'stop') {
                $('#sim-status').removeClass('bg-secondary bg-success').addClass('bg-danger').text('상태: 중지됨');
            }
        }

        $(document).ready(function () {

            // 시뮬레이션 시작
            $('#btn-sim-start').on('click', function () {
                sendMQTTMessage('simulation/start', 'start');
            });

            // 시뮬레이션 중지
            $('#btn-sim-stop').on('click', function () {
                sendMQTTMessage('simulation/stop', 'stop');
            });

        });
    </script>

</body>

</html>
