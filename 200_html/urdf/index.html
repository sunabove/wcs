<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>

<body>
  <!-- Load Three.js first -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
  <!-- Load OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>
  <!-- Load URDFLoader -->
  <script src="https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/umd/URDFLoader.min.js"></script>

  <script>
    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    // Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(2, 2, 2);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.6, 0);

    // Lights (URDF meshes can be dark without ambient light)
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    // Optional helpers
    scene.add(new THREE.GridHelper(10, 10));
    scene.add(new THREE.AxesHelper(0.5));

    // URDF Loader
    const loader = new URDFLoader();

    // If your URDF uses package:// URLs, you may need to map them.
    // Example:
    // loader.packages = { my_robot_description: './' };

    loader.load(
      './robot.urdf',
      (robot) => {
        scene.add(robot);

        // Try to frame the model automatically
        const box = new THREE.Box3().setFromObject(robot);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        if (isFinite(size.x) && isFinite(size.y) && isFinite(size.z)) {
          const maxSize = Math.max(size.x, size.y, size.z);
          const fitDist = maxSize / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)));

          camera.position.copy(center).add(new THREE.Vector3(fitDist, fitDist, fitDist));
          camera.near = Math.max(0.001, maxSize / 1000);
          camera.far = Math.max(10, maxSize * 100);
          camera.updateProjectionMatrix();

          controls.target.copy(center);
          controls.update();
        }

        console.log('URDF loaded:', robot);
      },
      (progress) => {
        if (progress?.total) {
          console.log(`Loading URDF: ${((progress.loaded / progress.total) * 100).toFixed(1)}%`);
        } else {
          console.log('Loading URDF...');
        }
      },
      (err) => {
        console.error('Failed to load URDF:', err);
      }
    );

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
