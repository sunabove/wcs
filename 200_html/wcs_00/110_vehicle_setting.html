<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wheel Configuration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f2238;
            color: white;
        }

        .dashboard {
            background: #1c3554;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
        }

        .header {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .sidebar {
            background: #162c46;
            border-radius: 10px;
            padding: 10px;
        }

        .menu-item {
            background: #244c74;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .menu-item.active {
            background: #4a8ed8;
        }

        .panel {
            background: #203a5c;
            border-radius: 10px;
            padding: 20px;
        }

        .option-box {
            background: #dfe5ec;
            color: #222;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .speed-box {
            width: 120px;
            font-size: 22px;
            text-align: center;
        }
    </style>

</head>


<body>

    <div class="container mt-4">

        <div class="dashboard">

            <div class="header">
                <a href="120_vehicle_test.html"> WCS </a>
                &nbsp;&nbsp; Wheel Configuration
            </div>


            <div class="row">

                <!-- LEFT MENU -->
                <div class="col-md-3">

                    <div class="sidebar">

                        <div class="menu-item">
                            RS485 Address
                        </div>

                        <div class="menu-item active">
                            Wheel Position
                        </div>

                        <div class="menu-item">
                            Speed Limit
                        </div>

                        <div class="menu-item">
                            PID Settings
                        </div>

                        <div class="menu-item">
                            Tof Calibration
                        </div>

                    </div>

                </div>



                <!-- RIGHT PANEL -->

                <div class="col-md-9">

                    <div class="panel">

                        <h3 class="mb-4">Wheel Position</h3>


                        <div class="option-box form-check">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">
                                Front Left (FL)
                            </label>
                        </div>


                        <div class="option-box form-check">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">
                                Front Right (FR)
                            </label>
                        </div>


                        <div class="option-box form-check">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">
                                Rear Left (RL)
                            </label>
                        </div>


                        <div class="option-box form-check">
                            <input class="form-check-input" type="checkbox" checked>
                            <label class="form-check-label">
                                Rear Right (RR)
                            </label>
                        </div>



                        <hr class="mt-4 mb-4">


                        <h4>Speed Limit</h4>

                        <div class="d-flex align-items-center mt-3">

                            <div class="me-3">
                                Max Speed :
                            </div>

                            <input class="form-control speed-box" type="number" value="3.0">

                            <div class="ms-2">
                                m/s
                            </div>

                        </div>


                    </div>

                </div>


            </div>

        </div>

    </div>

</body>

</html>
