<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wheel Control System</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body>

    <header class="p-1 text-bg-dark fs-5">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">

                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                    <li>
                        <a href="#" class="nav-link px-2 text-secondary">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Vehicle Status
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 text-white">
                            <i class="bi bi-gear-fill me-2"></i>
                            Wheel Setting
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link px-2 text-white">
                            <i class="bi bi-play-circle-fill me-2"></i>
                            Wheel Test
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container my-4">

        <!-- 차량 정보 -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">차량 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <!-- 바퀴 정보 -->
                        <div class="row">
                            <!-- FL 바퀴 정보 -->
                            <div class="col-md-6">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <i class="bi bi-arrow-up-right-square fs-1 text-primary"></i>
                                        <h5 class="card-title mt-2">FL Wheel</h5> 
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <table class="table table-bordered">
                                    <thead>
                                        <tr>
                                            <th class="text-center" scope="col" colspan="2">Motor</th> 
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <th scope="row">Speed</th>
                                            <td>45 km/h</td>
                                        </tr>
                                        <tr>
                                            <th scope="row">Torque</th>
                                            <td>120 Nm</td>
                                        </tr>
                                        <tr>
                                            <th scope="row">Temperature</th>
                                            <td>75 °C</td>
                                        </tr>
                                    </tbody>
                                </table> 
                            </div> 
                        </div>
                        <div class="row mt-2">
                            <!-- FR 바퀴 정보 -->
                             <div class="col-md-6">
                                <div class="card text-center">
                                    <div class="card-body">
                                        <i class="bi bi-arrow-up-right-square fs-1 text-primary"></i>
                                        <h5 class="card-title mt-2">FL Wheel</h5> 
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-battery-charging fs-1 text-success"></i>
                                <h5 class="card-title mt-2">Battery</h5>
                                <p class="card-text display-6">85%</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-geo-alt fs-1 text-info"></i>
                                <h5 class="card-title mt-2">Location</h5>
                                <p class="card-text">Zone A-1</p>
                            </div>
                        </div>
                    </div> 
                </div>
            </div>
        </div>
        <!-- // 차량 정보 -->

        <!-- 운행 정보 -->
        <div class="card mt-2">
            <div class="card-header">
                <h4 class="mb-0">운행 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-speedometer2 fs-1 text-primary"></i>
                                <h5 class="card-title mt-2">Speed</h5>
                                <p class="card-text display-6">45 km/h</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-battery-charging fs-1 text-success"></i>
                                <h5 class="card-title mt-2">Battery</h5>
                                <p class="card-text display-6">85%</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-geo-alt fs-1 text-info"></i>
                                <h5 class="card-title mt-2">Location</h5>
                                <p class="card-text display-6">Zone A-1</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="bi bi-check-circle fs-1 text-success"></i>
                                <h5 class="card-title mt-2">Status</h5>
                                <p class="card-text display-6">Active</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- // 운행 정보 -->

        <!-- 노면 정보 -->
        <div class="card mt-2">
            <div class="card-header">
                <h4 class="mb-0">노면 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-road fs-1 text-dark"></i>
                                <h5 class="card-title mt-2">도로</h5>
                                <p class="card-text display-6">포장도로</p>
                                <span class="badge bg-success fs-6">양호</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-mountain fs-1 text-warning"></i>
                                <h5 class="card-title mt-2">자갈길</h5>
                                <p class="card-text display-6">비포장도로</p>
                                <span class="badge bg-warning fs-6">주의</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <i class="fas fa-exclamation-triangle fs-1 text-danger"></i>
                                <h5 class="card-title mt-2">포트홀</h5>
                                <p class="card-text display-6">도로 손상</p>
                                <span class="badge bg-danger fs-6">위험</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- // 노면 정보 -->

    </main>

</body>

</html>
