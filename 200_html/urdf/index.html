<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URDF Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        #robot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            width: 90vw;
            max-width: 1200px;
            height: 80vh;
            max-height: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        .robot-container {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
            position: relative;
        }

        .robot-container .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 100;
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .info {
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
    </style>

    <!-- Import map for module resolution -->
    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/",
      "urdf-loader": "https://cdn.jsdelivr.net/npm/urdf-loader@0.12.3/src/URDFLoader.js"
    }
  }
  </script>
</head>

<body>
    <div class="controls">
        <h1>URDF Viewer - 4 Panel View</h1>
        <p>Click and drag to rotate • Scroll to zoom • Click on robot to set target</p>
    </div>

    <div id="robot-grid">
        <div class="robot-container" id="robot-container-1">
            <div class="label">Front Right</div>
        </div>
        <div class="robot-container" id="robot-container-2">
            <div class="label">Front Left</div>
        </div>
        <div class="robot-container" id="robot-container-3">
            <div class="label">Back Right</div>
        </div>
        <div class="robot-container" id="robot-container-4">
            <div class="label">Back Left</div>
        </div>
    </div>
    
    <div class="info">
        <p>Robot model will appear in each panel above. Check console for loading status.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import URDFLoader from 'urdf-loader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

        // 각 뷰어를 위한 클래스
        class URDFViewer {
            constructor(containerId, viewLabel, viewIndex) {
                this.container = document.getElementById(containerId);
                this.viewLabel = viewLabel;
                this.viewIndex = viewIndex;
                this.robotModel = null;
                this.goalTarget = new THREE.Vector3(0, 0, 0);
                this.targetMarker = null;
                
                this.init();
            }

            init() {
                // 동적 크기 계산
                const containerRect = this.container.getBoundingClientRect();
                const width = containerRect.width;
                const height = containerRect.height;
                
                console.log(`${this.viewLabel} 컨테이너 크기: ${width}x${height}`);

                // Scene 생성
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xf8f8f8);

                // Camera 생성
                this.camera = new THREE.PerspectiveCamera(50, width / height, 0.01, 1000);
                this.camera.position.set(3, 3, 3);

                // Renderer 생성
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(width, height);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.container.appendChild(this.renderer.domElement);

                // Controls 설정
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;

                // 조명 설정
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
                directionalLight.position.set(5, 5, 5);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);

                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                this.scene.add(ambientLight);

                // 바닥 그리드와 축 추가
                const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0xcccccc);
                this.scene.add(gridHelper);

                const axesHelper = new THREE.AxesHelper(1);
                this.scene.add(axesHelper);

                // 마우스 이벤트 설정
                this.setupMouseEvents();

                // URDF 로드
                this.loadURDF();

                // 애니메이션 시작
                this.animate();

                // 리사이즈 이벤트 설정
                this.setupResizeHandler();
            }

            setupMouseEvents() {
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();

                this.container.addEventListener('mousedown', (event) => {
                    const rect = this.container.getBoundingClientRect();
                    const width = rect.width;
                    const height = rect.height;
                    
                    mouse.x = ((event.clientX - rect.left) / width) * 2 - 1;
                    mouse.y = -((event.clientY - rect.top) / height) * 2 + 1;

                    raycaster.setFromCamera(mouse, this.camera);

                    if (this.robotModel) {
                        const intersects = raycaster.intersectObject(this.robotModel, true);

                        if (intersects.length > 0) {
                            this.goalTarget.copy(intersects[0].point);
                            console.log(`${this.viewLabel} 목표 지점 설정:`, this.goalTarget);
                            this.showTargetMarker(intersects[0].point);
                        }
                    }
                });
            }

            showTargetMarker(position) {
                // 기존 마커 제거
                if (this.targetMarker) {
                    this.scene.remove(this.targetMarker);
                }

                // 새 마커 생성
                const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                this.targetMarker = new THREE.Mesh(geometry, material);
                this.targetMarker.position.copy(position);
                this.scene.add(this.targetMarker);
            }

            loadURDF() {
                const loader = new URDFLoader();
                
                console.log(`${this.viewLabel} URDF 파일 로딩 중...`);

                loader.load(
                    "./wheel_3/urdf/wheel.urdf",
                    robot => {
                        console.log(`✅ ${this.viewLabel} URDF 로드 성공`);

                        // 스케일링 (단위 변환)
                        robot.scale.set(1000, 1000, 1000);

                        this.scene.add(robot);
                        this.robotModel = robot;

                        // 자동 피팅 로직
                        setTimeout(() => {
                            const bbox = new THREE.Box3().setFromObject(robot);
                            const center = bbox.getCenter(new THREE.Vector3());
                            const size = bbox.getSize(new THREE.Vector3());
                            const maxDim = Math.max(size.x, size.y, size.z);

                            console.log(`📏 ${this.viewLabel} 모델 크기:`, size);
                            console.log(`📍 ${this.viewLabel} 모델 중심:`, center);

                            // 카메라 위치 자동 조정 - 각 뷰마다 다른 각도
                            const cameraDist = maxDim === 0 ? 2 : maxDim * 0.6;
                            
                            // 각 뷰에 따른 다른 초기 카메라 위치 설정
                            let cameraPosition;
                            switch(this.viewIndex) {
                                case 1: // View 1 - 앞쪽 오른쪽 위
                                    cameraPosition = {
                                        x: center.x + cameraDist * 0.8,
                                        y: center.y + cameraDist * 1.2,
                                        z: center.z + cameraDist * 0.8
                                    };
                                    break;
                                case 2: // View 2 - 앞쪽 왼쪽 위  
                                    cameraPosition = {
                                        x: center.x - cameraDist * 0.8,
                                        y: center.y + cameraDist * 1.2,
                                        z: center.z + cameraDist * 0.8
                                    };
                                    break;
                                case 3: // View 3 - 뒤쪽 오른쪽 위
                                    cameraPosition = {
                                        x: center.x + cameraDist * 0.8,
                                        y: center.y + cameraDist * 1.2,
                                        z: center.z - cameraDist * 0.8
                                    };
                                    break;
                                case 4: // View 4 - 뒤쪽 왼쪽 위
                                    cameraPosition = {
                                        x: center.x - cameraDist * 0.8,
                                        y: center.y + cameraDist * 1.2,
                                        z: center.z - cameraDist * 0.8
                                    };
                                    break;
                                default:
                                    cameraPosition = {
                                        x: center.x + cameraDist,
                                        y: center.y + cameraDist,
                                        z: center.z + cameraDist
                                    };
                            }

                            this.camera.position.set(
                                cameraPosition.x,
                                cameraPosition.y,
                                cameraPosition.z
                            );
                            this.camera.lookAt(center);

                            // 회전 중심 업데이트
                            this.goalTarget.copy(center);
                            this.controls.target.copy(center);
                            this.controls.update();

                            console.log(`✅ ${this.viewLabel} 자동 피팅 완료: 거리`, cameraDist.toFixed(4));
                        }, 200);
                    },
                    progress => {
                        if (progress?.total) {
                            const percent = ((progress.loaded / progress.total) * 100).toFixed(1);
                            console.log(`${this.viewLabel} URDF 로딩 진행률: ${percent}%`);
                        }
                    },
                    error => {
                        console.error(`❌ ${this.viewLabel} URDF 로드 실패:`, error);
                    }
                );
            }

            setupResizeHandler() {
                window.addEventListener('resize', () => {
                    const newRect = this.container.getBoundingClientRect();
                    const newWidth = newRect.width;
                    const newHeight = newRect.height;
                    
                    this.camera.aspect = newWidth / newHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(newWidth, newHeight);
                    
                    console.log(`${this.viewLabel} 리사이즈: ${newWidth}x${newHeight}`);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // 4개의 뷰어 생성
        console.log("🚀 4개 URDF Viewer 초기화 시작...");
        
        const viewer1 = new URDFViewer('robot-container-1', 'View 1', 1);
        const viewer2 = new URDFViewer('robot-container-2', 'View 2', 2); 
        const viewer3 = new URDFViewer('robot-container-3', 'View 3', 3);
        const viewer4 = new URDFViewer('robot-container-4', 'View 4', 4);

        console.log("🚀 모든 URDF Viewer 초기화 완료");
    </script>
</body>

</html>
